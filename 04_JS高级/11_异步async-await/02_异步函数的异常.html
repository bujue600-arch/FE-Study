<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <script>

    //普通函数：异常会立即中断执行并报错
    //未捕获错误 Uncaught TypeError: "123".filter is not a function
    //"123".filter()

    //异步函数：异常会被封装成一个被拒绝的Promise对象
    async function foo() {
      console.log("first")
      throw new Error("throw抛出了一个错误")
    }

    foo().then(() => {
      console.log("success")
    }).catch((err) => {
      console.log("error:" + err)
    })

  </script>

</body>

</html>
