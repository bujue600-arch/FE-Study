<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

<body>

  <script>

    const requestData = (url, isSuccess = true) => {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (isSuccess) {
            resolve(`请求${url}成功了`)
          } else {
            reject(`请求${url}失败了`)
          }
        }, 3000)
      })
    }

    async function getData(isSuccess) {
      const res1 = await requestData("wh.com", isSuccess)
      const res2 = await requestData(res1 + " /api", isSuccess)
    }

    getData(false)

  </script>


</body>

</html>
