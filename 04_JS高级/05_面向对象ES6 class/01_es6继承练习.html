<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <script>

    class Device {
      constructor(brand, model) {
        this.brand = brand
        this.model = model
      }

      getInfo() {
        return `brand:${this.brand},model:${this.model}`
      }

      static getType() {
        return '电子设备'
      }
    }


    class Phone extends Device {
      constructor(brand, model, price) {
        super(brand, model)
        this.price = price
      }

      getPrice() {
        return this.price
      }
    }


    const phone = new Phone('Apple', 'iPhone 14 Pro Max', 9999)
    console.log(phone.getInfo())

  </script>

</body>

</html>
