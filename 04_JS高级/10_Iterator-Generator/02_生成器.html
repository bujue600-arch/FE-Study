<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>



  <script>

    function* foo() {
      console.log("first")
      yield console.log("2")
      console.log("3")
      yield
      console.log("4")
    }

    const generator = foo()

    generator.next()
    generator.next()
    generator.next()

  </script>
</body>

</html>
