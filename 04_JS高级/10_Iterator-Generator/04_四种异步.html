  <script>

    //异步请求函数
    function requestData(url, isSuccess = true) {
      return new Promise((resolve, reject) => {
        if (isSuccess) {
          setTimeout(() => {
            resolve(url)
          }, 2000)
        } else reject(url)
      })
    }
