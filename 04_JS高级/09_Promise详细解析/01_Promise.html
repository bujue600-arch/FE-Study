<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

  <script>


    function request(name, id, isSuccess = true) {
      return new Promise((resolve, reject) => {
        if (isSuccess) {
          resolve(`请求${name}成功，id为${id}`)
        } else {
          reject(`请求${name}失败，id为${id}`)
        }
      })
    }

    request("why", 1).then(res => {
      console.log(res)
    }).catch(err => {
      console.log(err)
    })

  </script>


</body>

</html>
