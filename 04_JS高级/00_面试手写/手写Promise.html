<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

</head>

<body>
  <script>





    function counter(num) {

      const promise = new Promise((resolve, reject) => {
        let res = 0
        if (num >= 0) {
          for (let i = 0; i < num; i++) {
            res += i
          }
          resolve(res)
        } else {
          reject("传入数字不得为负数")
        }
      })

      return promise
    }


    counter(-1).then(res => {
      console.log(res)
    }).catch(err => {
      console.log(err)
    })


  </script>

</body>

</html>
